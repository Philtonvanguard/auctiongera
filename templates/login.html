{% extends "base.html" %}
{% block title %}Login — AuctionGera{% endblock %}
{% block content %}
<div class="form-page">
  <div class="form-card">
    <div class="form-card-header">
      <div class="form-card-logo">🏚</div>
      <h2 class="form-card-title">Welcome Back</h2>
      <p class="form-card-subtitle">Login to AuctionGera to start bidding</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Your password" required>
      </div>
      <div class="form-group">
        <label class="form-check">
          <input type="checkbox" name="remember">
          <span style="color:var(--text-muted);font-size:0.9rem;">Remember me</span>
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Login</button>
    </form>

    <div class="form-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Register free</a>
    </div>
  </div>
</div>
{% endblock %}
